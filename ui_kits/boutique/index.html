<!-- @startingPoint section="Boutique" subtitle="Site e-commerce bilingue — accueil + fiche produit + éditorial" viewport="1280x760" -->
<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koyumé — Coussins pour enfants</title>
<meta name="description" content="Coussins pour enfants en fibre de bambou, doux et lavables en machine. Trois tailles, des nouveau-nés aux grands. Toile de Jouy dessinée en France. Livraison offerte dès 50 €.">
<link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
<meta property="og:type" content="website">
<meta property="og:title" content="Koyumé — Coussins pour enfants">
<meta property="og:description" content="Coussins en fibre de bambou pour enfants. Trois tailles, des nouveau-nés aux grands. Livraison offerte dès 50 €.">
<meta property="og:image" content="https://koyume.fr/assets/hero-lifestyle.jpg">
<meta property="og:url" content="https://koyume.fr/">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="responsive.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js?v=5"></script>
<style>
  html, body { margin: 0; background: var(--surface-page); }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Editorial.jsx"></script>
<script type="text/babel" src="Product.jsx"></script>
<script type="text/babel">
const { Toast, Dialog, Button } = window.PetitNuageDesignSystem_f04838;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroVariant": "film",
  "showFanions": true
}/*EDITMODE-END*/;

function App() {
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [lang, setLang] = React.useState(localStorage.getItem('lpm-lang') || 'fr');
  const [screen, setScreen] = React.useState({ name: 'home' });
  const [cart, setCart] = React.useState([]);
  const [toast, setToast] = React.useState(null);
  const [cartOpen, setCartOpen] = React.useState(false);
  const t = window.lpmT[lang];

  const changeLang = (l) => { setLang(l); localStorage.setItem('lpm-lang', l); };
  const addToCart = (p) => {
    setCart(c => [...c, p]);
    setToast(t.added);
    setTimeout(() => setToast(null), 2400);
  };
  const nav = (name, product) => { setScreen({ name, product }); window.scrollTo(0, 0); };
  const addOne = (p) => setCart(c => [...c, p]);
  const removeOne = (p) => setCart(c => { const i = c.findIndex(x => x.id === p.id); if (i < 0) return c; const n = [...c]; n.splice(i, 1); return n; });
  const removeAll = (p) => setCart(c => c.filter(x => x.id !== p.id));
  // Shopify checkout: aggregate the cart into a permalink like /cart/VARIANT:QTY,VARIANT:QTY
  const checkout = () => {
    const counts = {};
    cart.forEach(p => { if (p.shopifyVariant) counts[p.shopifyVariant] = (counts[p.shopifyVariant] || 0) + 1; });
    const items = Object.entries(counts).map(([v, q]) => `${v}:${q}`).join(',');
    if (items) {
      window.location.href = `https://${window.lpmShopifyDomain}/cart/${items}`;
    } else if (cart.length > 0) {
      // Stale cached data.js without Shopify IDs: reload past the cache so the button works on the next try.
      window.location.href = window.location.pathname + '?refresh=' + Date.now();
    }
  };
  const screenLabels = { home: 'Accueil', product: 'Fiche produit', maison: 'La maison', guide: 'Guide du sommeil', faq: 'Vos questions' };

  return (
    <div data-screen-label={screenLabels[screen.name]} style={tw.showFanions ? null : { ['--lpm-rose-300']: 'transparent', ['--lpm-straw-300']: 'transparent', ['--lpm-sage-300']: 'transparent' }}>
      <AnnounceBar t={t} />
      <Header t={t} lang={lang} setLang={changeLang} onNav={nav} active={screen.name === 'home' ? 0 : screen.name === 'maison' ? 1 : screen.name === 'guide' ? 2 : -1} cartCount={cart.length} onCart={() => setCartOpen(true)} />
      {screen.name === 'home' && <HomeScreen lang={lang} t={t} heroVariant={tw.heroVariant} onOpenProduct={(p) => nav('product', p)} />}
      {screen.name === 'product' && <ProductScreen product={screen.product} lang={lang} t={t} onBack={() => nav('home')} onAdd={addToCart} />}
      {screen.name === 'maison' && <MaisonScreen t={t} onOpenCollection={() => nav('home')} />}
      {screen.name === 'guide' && <GuideSommeilScreen t={t} onOpenCollection={() => nav('home')} />}
      {screen.name === 'faq' && <FaqScreen t={t} />}
      <Footer t={t} onNav={nav} />

      {toast && (
        <div style={{ position: 'fixed', bottom: 28, left: '50%', transform: 'translateX(-50%)', zIndex: 60 }}>
          <Toast tone="success">{toast}</Toast>
        </div>
      )}

      <Dialog open={cartOpen} title={t.cartLabel} onClose={() => setCartOpen(false)}
        actions={cart.length > 0 && <>
          <Button variant="ghost" onClick={() => setCartOpen(false)}>{t.continueShopping}</Button>
          <Button onClick={checkout}>{t.checkout}</Button>
        </>}>
        {cart.length === 0
          ? <p style={{ margin: 0, fontSize: 15 }}>{t.cartEmpty}</p>
          : (() => {
              const grouped = [];
              cart.forEach(p => { const g = grouped.find(x => x.p.id === p.id); if (g) g.qty += 1; else grouped.push({ p, qty: 1 }); });
              const subtotal = cart.reduce((s, p) => s + parseInt(p.price), 0);
              const qtyBtn = { width: 24, height: 24, borderRadius: 6, border: '1px solid var(--border-soft)', background: '#fff', cursor: 'pointer', fontFamily: 'var(--font-body)', fontSize: 14, lineHeight: 1, color: 'var(--text-heading)', padding: 0 };
              return (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  {grouped.map(({ p, qty }) => (
                    <div key={p.id} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{ width: 56, height: 44, borderRadius: 8, overflow: 'hidden', border: '1px solid var(--border-soft)', background: '#fff', flexShrink: 0 }}>
                        <img src={p.img} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
                      </div>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 600, color: 'var(--text-heading)', fontSize: 14, fontFamily: 'var(--font-body)' }}>{p[lang].name}</div>
                        <div style={{ fontSize: 12.5, color: 'var(--text-muted)' }}>{p.dims}</div>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                        <button style={qtyBtn} aria-label="−" onClick={() => removeOne(p)}>−</button>
                        <span style={{ fontFamily: 'var(--font-body)', fontSize: 14, fontWeight: 600, minWidth: 16, textAlign: 'center' }}>{qty}</span>
                        <button style={qtyBtn} aria-label="+" onClick={() => addOne(p)}>+</button>
                      </div>
                      <div style={{ fontWeight: 600, fontSize: 14, color: 'var(--text-heading)', minWidth: 44, textAlign: 'right' }}>{lang === 'fr' ? `${qty * parseInt(p.price)} €` : `€${qty * parseInt(p.price)}`}</div>
                      <button style={{ ...qtyBtn, border: 'none', background: 'none', color: 'var(--text-faint)', fontSize: 15 }} aria-label="×" onClick={() => removeAll(p)}>×</button>
                    </div>
                  ))}
                  <div style={{ borderTop: '1px solid var(--border-soft)', paddingTop: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 12.5, color: 'var(--text-muted)' }}>{subtotal >= 50 ? '✓ ' : ''}{t.freeShipHint}</span>
                    <span style={{ fontFamily: 'var(--font-body)', fontSize: 15, fontWeight: 600, color: 'var(--text-heading)' }}>{t.subtotal} · {lang === 'fr' ? `${subtotal} €` : `€${subtotal}`}</span>
                  </div>
                </div>
              );
            })()}
      </Dialog>

      <TweaksPanel>
        <TweakSection label="Accueil" />
        <TweakRadio label="Hero" value={tw.heroVariant}
          options={[{ value: 'packshot', label: 'Packshot' }, { value: 'lifestyle', label: 'Photo' }, { value: 'film', label: 'Film' }]}
          onChange={(v) => setTweak('heroVariant', v)} />
        <TweakSection label="Identité" />
        <TweakToggle label="Fanions (micro-signature)" value={tw.showFanions} onChange={(v) => setTweak('showFanions', v)} />
      </TweaksPanel>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
